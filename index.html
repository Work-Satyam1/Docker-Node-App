<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Docker Node App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
text-align:center;
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:12px;
backdrop-filter: blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
width:420px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
opacity:0.8;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#00c6ff;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
border:none;
border-radius:6px;
text-decoration:none;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.footer{
margin-top:20px;
font-size:13px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Docker Node App</h1>

<p>Your Node.js application is successfully running inside a Docker container.</p>

<a href="#" class="btn">Explore Project</a>

<div class="footer">
Built with Node.js • Docker • HTML • CSS
</div>

</div>

</body>
</html>
